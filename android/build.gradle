// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.0"
    }
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
        maven { url 'https://maven.expo.io' }
    }
    dependencies {
        classpath('com.android.tools.build:gradle:8.10.1')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath 'com.google.gms:google-services:4.4.3'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
        maven { url 'https://maven.expo.io' }
        maven { url("$rootDir/../node_modules/react-native/android") }
        maven { url("$rootDir/../node_modules/jsc-android/dist") }
    }
    
    configurations.all {
        resolutionStrategy {
            force "com.facebook.react:react-android:0.72.10"
            force "com.facebook.react:hermes-android:0.72.10"
            // Force resolution for libraries looking for react-native
            eachDependency { details ->
                if (details.requested.group == 'com.facebook.react' && details.requested.name == 'react-native') {
                    details.useTarget group: 'com.facebook.react', name: 'react-android', version: '0.72.10'
                }
            }
        }
    }
}

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            android {
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
                defaultConfig {
                    ndk {
                        abiFilters "armeabi-v7a", "arm64-v8a"
                    }
                }
                buildTypes.all { buildType ->
                    buildType.ndk {
                        abiFilters "armeabi-v7a", "arm64-v8a"
                    }
                }
            }
        }
        
        // Configure Kotlin compilation for all projects
        tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
                jvmTarget = "17"
            }
        }
    }
}